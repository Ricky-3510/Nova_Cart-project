<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="page-index">

    <nav>
        <div class="nav-left">
            <div class="logo">NovaCart</div>
            <div class="nav-links">
                <a href="index.html">Shop</a>
                <a href="about.html">About</a>
            </div>
        </div>
        <div class="nav-right">
            <div class="search-wrapper">
                <button class="icon-btn" id="searchBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </button>
                <div class="search-box" id="searchBox">
                    <input type="text" id="searchInput" placeholder="Search products...">
                </div>
            </div>
            <select id="categoryFilter">
                <option value="all">All Categories</option>
            </select>
            <button class="btn" onclick="window.location.href='login.html'">Login</button>
            <button class="btn dark-btn" onclick="window.location.href='Registration.html'">Register</button>
            <!-- Cart button — onclick opens the sidebar -->
            <button class="icon-btn cart-btn" onclick="openCart()">
                🛒
                <span class="cart-count cart-badge">0</span>
            </button>
        </div>
    </nav>

    <section class="hero">
        <img src="https://images.unsplash.com/photo-1555529669-e69e7aa0ba9a?auto=format&fit=crop&w=1800&q=80">
        <div class="hero-content">
            <span class="new-tag">NEW COLLECTION</span>
            <h1>Shop reliable products for everyday work and life.</h1>
            <p>Curated electronics, fashion, home goods, and accessories with a fast local cart experience.</p>
        </div>
        <div class="stats">
            <div class="stat-box"><h2>50</h2><p>Products</p></div>
            <div class="stat-box"><h2>5</h2><p>Pages</p></div>
            <div class="stat-box"><h2>24h</h2><p>Dispatch</p></div>
        </div>
    </section>

    <section class="product-grid-container">
        <h2>Products</h2>
        <div class="grid-controls">
            <p id="productInfo"></p>
            <select class="sortSelect" id="sortSelect">
                <option value="featured">Featured</option>
                <option value="price-low">Price: Low to High</option>
                <option value="price-high">Price: High to Low</option>
            </select>
        </div>
        <div class="products-grid" id="productsGrid"></div>
        <div class="pagination" id="pagination"></div>
    </section>

    <!-- CART SIDEBAR OVERLAY -->
    <div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>

    <!-- CART SIDEBAR -->
    <div class="cart-sidebar" id="cartSidebar">

        <div class="cart-header">
            <div>
                <h4 class="cart-title">Shopping Cart</h4>
                <small class="cart-item-count" id="cartCount">0 items</small>
            </div>
            <button class="cart-close-btn" onclick="closeCart()">✕</button>
        </div>

        <div class="cart-body">
            <!-- Dynamic cart items injected here by updateCart() -->
            <div id="cartItems"></div>

            <!-- Totals -->
            <div class="cart-footer">
                <div class="cart-row">
                    <span class="cart-label">Subtotal</span>
                    <span class="cart-value" id="cartSubtotal">$0.00</span>
                </div>
                <div class="cart-row">
                    <span class="cart-label">Shipping</span>
                    <span class="cart-value" id="shippingCost">$0.00</span>
                </div>
                <div class="cart-row cart-grand-total">
                    <span>Total</span>
                    <span id="cartTotal">$0.00</span>
                </div>
                <button class="cart-clear-btn" onclick="clearCart()">Clear Cart</button>
                <button class="cart-checkout-btn">Checkout</button>
            </div>
        </div>

    </div>

    <script src="main.js"></script>

</body>

</html>
