<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart Login</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="page-login">

    <nav>
        <div class="nav-left">
            <div class="logo">NovaCart</div>
            <div class="nav-links">
                <a href="index.html">Shop</a>
                <a href="about.html">About</a>
            </div>
        </div>
        <div class="nav-right">
            <button class="btn" onclick="window.location.href='login.html'">Login</button>
            <button class="btn dark-btn" onclick="window.location.href='Registration.html'">Register</button>
        </div>
    </nav>

    <!-- Renamed: .container → .auth-container -->
    <div class="auth-container">

        <!-- Renamed: .left → .auth-left -->
        <div class="auth-left">
            <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1100&q=80"
                alt="Login Image">
            <div class="overlay">
                <h4>WELCOME BACK</h4>
                <h1>Access your cart and continue shopping faster.</h1>
                <p>Your demo account is stored locally in this browser for portfolio and learning use.</p>
            </div>
        </div>

        <!-- Renamed: .right → .auth-right -->
        <div class="auth-right">
            <h1>Login</h1>
            <p class="subtitle">Enter your registered email and password.</p>

            <form id="loginForm">

                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" id="email">
                    <div class="error" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password">
                    <div class="error" id="passwordError"></div>
                </div>

                <div class="remember">
                    <div class="remember-left">
                        <input type="checkbox">
                        <label>Remember me</label>
                    </div>
                    <a href="Registration.html">Create account</a>
                </div>

                <button type="submit" class="submit-btn">Login</button>

            </form>
        </div>

    </div>

    <script src="main.js"></script>

</body>

</html>
