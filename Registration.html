<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>NovaCart Register</title>

      <style>
            * {
                  margin: 0;
                  padding: 0;
                  box-sizing: border-box;
                  font-family: Arial, Helvetica, sans-serif;
            }

            body {
                  background: #f3f4f6;
            }

            nav {
                  width: 100%;
                  height: 75px;
                  background: white;
                  display: flex;
                  justify-content: space-between;
                  align-items: center;
                  padding: 0 120px;
                  border-bottom: 1px solid #ddd;
            }

            .logo {
                  display: flex;
                  align-items: center;
                  gap: 30px;
            }

            .logo h1 {
                  font-size: 32px;
            }

            .nav-links a {
                  text-decoration: none;
                  color: #444;
                  margin-right: 20px;
                  font-size: 18px;
            }

            .nav-btn button {
                  padding: 10px 18px;
                  margin-left: 10px;
                  border-radius: 5px;
                  cursor: pointer;
                  font-size: 15px;
            }

            .login {
                  border: 1px solid black;
                  background: white;
            }

            .register {
                  background: #111827;
                  color: white;
                  border: none;
            }

            .container {
                  width: 1100px;
                  background: white;
                  margin: 50px auto;
                  border-radius: 10px;
                  overflow: hidden;
                  display: flex;
                  box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }

            .left {
                  width: 50%;
                  position: relative;
            }

            .left img {
                filter: brightness(0.4) contrast(1.1);
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .overlay {
                  position: absolute;
                  bottom: 40px;
                  left: 40px;
                  color: white;
            }

            .overlay h4 {
                  color: #a7f3d0;
                  letter-spacing: 2px;
                  margin-bottom: 15px;
            }

            .overlay h1 {
                  font-size: 45px;
                  line-height: 55px;
                  margin-bottom: 20px;
            }

            .overlay p {
                  width: 85%;
                  font-size: 20px;
                  line-height: 30px;
            }

            .right {
                  width: 50%;
                  padding: 60px;
            }

            .right h1 {
                  font-size: 45px;
                  margin-bottom: 10px;
            }

            .subtitle {
                  color: #666;
                  margin-bottom: 30px;
                  font-size: 18px;
            }

            .form-group {
                  margin-bottom: 22px;
            }

            .form-group label {
                  display: block;
                  margin-bottom: 8px;
                  font-size: 18px;
            }

            .form-group input {
                  width: 100%;
                  padding: 15px;
                  border-radius: 8px;
                  border: 1px solid #ccc;
                  font-size: 16px;
            }

            .form-group input:focus {
                  outline: none;
                  border-color: #111827;
            }

            .error {
                  color: red;
                  font-size: 14px;
                  margin-top: 5px;
            }

            .checkbox {
                  display: flex;
                  align-items: center;
                  gap: 10px;
                  margin-bottom: 25px;
            }

            .checkbox input {
                  width: 18px;
                  height: 18px;
            }

            .submit-btn {
                  width: 100%;
                  padding: 16px;
                  border: none;
                  background: #111827;
                  color: white;
                  border-radius: 8px;
                  font-size: 20px;
                  cursor: pointer;
            }

            .submit-btn:hover {
                  background: black;
            }

            .bottom-text {
                  text-align: center;
                  margin-top: 20px;
                  font-size: 17px;
            }

            .bottom-text a {
                  color: black;
                  font-weight: bold;
            }
      </style>
</head>

<body>

      <nav>

            <div class="logo">

                  <h1>NovaCart</h1>

                  <div class="nav-links">
                        <a href="#">Shop</a>
                        <a href="#">About</a>
                  </div>

            </div>

            <div class="nav-btn">
                  <button class="login">Login</button>
                  <button class="register">Register</button>
            </div>

      </nav>

      <div class="container">

            <div class="left">

                  <img src="https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&w=1100&q=80"
                        alt="Register Image">

                  <div class="overlay">
                        <h4>JOIN NOVACART</h4>
                        <h1>Create an account with practical validation and secure local hashing.</h1>
                        <p>This front-end demo uses browser storage, suitable for showcasing UI and JavaScript flow.</p>
                  </div>

            </div>

            <div class="right">

                  <h1>Create account</h1>

                  <p class="subtitle">
                        Use a strong password to register.
                  </p>

                  <form id="registerForm">

                        <div class="form-group">
                              <label>Full name</label>

                              <input type="text" id="name">

                              <div class="error" id="nameError"></div>
                        </div>

                        <div class="form-group">
                              <label>Email address</label>

                              <input type="email" id="email">

                              <div class="error" id="emailError"></div>
                        </div>

                        <div class="form-group">
                              <label>Password</label>

                              <input type="password" id="password">

                              <div class="error" id="passwordError"></div>
                        </div>

                        <div class="form-group">
                              <label>Confirm password</label>

                              <input type="password" id="confirmPassword">

                              <div class="error" id="confirmPasswordError"></div>
                        </div>

                        <div class="checkbox">
                              <input type="checkbox" id="terms">

                              <label>I agree to the NovaCart account terms</label>
                        </div>

                        <div class="error" id="termsError"></div>

                        <button type="submit" class="submit-btn">
                              Create account
                        </button>

                  </form>

                  <div class="bottom-text">
                        Already registered?
                        <a href="Login.html">Login</a>
                  </div>

            </div>

      </div>

      <script>

            let form = document.getElementById("registerForm");

            form.addEventListener("submit", function (e) {

                  e.preventDefault();
                  let name = document.getElementById("name").value.trim();
                  let email = document.getElementById("email").value.trim();
                  let password = document.getElementById("password").value.trim();
                  let confirmPassword = document.getElementById("confirmPassword").value.trim();
                  let terms = document.getElementById("terms").checked;

                  document.getElementById("nameError").innerHTML = "";
                  document.getElementById("emailError").innerHTML = "";
                  document.getElementById("passwordError").innerHTML = "";
                  document.getElementById("confirmPasswordError").innerHTML = "";
                  document.getElementById("termsError").innerHTML = "";

                  let valid = true;
                  // Name Validation

                  if (name === "") {

                        document.getElementById("nameError").innerHTML =
                              "Full name is required";

                        valid = false;
                  }
                  // Email Validation

                  let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

                  if (email === "") {

                        document.getElementById("emailError").innerHTML =
                              "Email is required";

                        valid = false;
                  }

                  else if (!email.match(emailPattern)) {

                        document.getElementById("emailError").innerHTML =
                              "Enter valid email";

                        valid = false;
                  }
                  // Password Validation

                  let passwordPattern =
                        /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;

                  if (password === "") {

                        document.getElementById("passwordError").innerHTML =
                              "Password is required";

                        valid = false;
                  }

                  else if (!password.match(passwordPattern)) {

                        document.getElementById("passwordError").innerHTML =
                              "Password must contain uppercase, lowercase, number and symbol";

                        valid = false;
                  }
                  // Confirm Password

                  if (confirmPassword === "") {

                        document.getElementById("confirmPasswordError").innerHTML =
                              "Confirm your password";

                        valid = false;
                  }

                  else if (password !== confirmPassword) {
                        document.getElementById("confirmPasswordError").innerHTML =
                              "Passwords do not match";

                        valid = false;
                  }
                  // Terms Validation
                  if (!terms) {

                        document.getElementById("termsError").innerHTML =
                              "Please accept terms and conditions";

                        valid = false;
                  }
                  // Save Data
                  if (valid) {

                        let user = {
                              name: name,
                              email: email,
                              password: password
                        };

                        localStorage.setItem("user", JSON.stringify(user));
                        alert("Account Created Successfully");
                        form.reset();
                  }
            });

      </script>

</body>

</html>
