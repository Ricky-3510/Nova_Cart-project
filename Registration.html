<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart Register</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="page-register">

    <nav>
        <div class="nav-left">
            <div class="logo">NovaCart</div>
            <div class="nav-links">
                <a href="index.html">Shop</a>
                <a href="about.html">About</a>
            </div>
        </div>
        <div class="nav-right">
            <button class="btn" onclick="window.location.href='login.html'">Login</button>
            <button class="btn dark-btn" onclick="window.location.href='Registration.html'">Register</button>
        </div>
    </nav>

    <!-- Renamed: .container → .auth-container -->
    <div class="auth-container">

        <!-- Renamed: .left → .auth-left -->
        <div class="auth-left">
            <img src="https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&w=1100&q=80"
                alt="Register Image">
            <div class="overlay">
                <h4>JOIN NOVACART</h4>
                <h1>Create an account with practical validation and secure local hashing.</h1>
                <p>This front-end demo uses browser storage, suitable for showcasing UI and JavaScript flow.</p>
            </div>
        </div>

        <!-- Renamed: .right → .auth-right -->
        <div class="auth-right">
            <h1>Create account</h1>
            <p class="subtitle">Use a strong password to register.</p>

            <form id="registerForm">

                <div class="form-group">
                    <label>Full name</label>
                    <input type="text" id="name">
                    <div class="error" id="nameError"></div>
                </div>

                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" id="email">
                    <div class="error" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password">
                    <div class="error" id="passwordError"></div>
                </div>

                <div class="form-group">
                    <label>Confirm password</label>
                    <input type="password" id="confirmPassword">
                    <div class="error" id="confirmPasswordError"></div>
                </div>

                <div class="checkbox">
                    <input type="checkbox" id="terms">
                    <label>I agree to the NovaCart account terms</label>
                </div>

                <div class="error" id="termsError"></div>

                <button type="submit" class="submit-btn">Create account</button>

            </form>

            <div class="bottom-text">
                Already registered? <a href="login.html">Login</a>
            </div>

        </div>

    </div>

    <script src="main.js"></script>

</body>

</html>
