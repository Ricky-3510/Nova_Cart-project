<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f5f5f5;
            color: #111;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 70px;
            background: white;
            border-bottom: 1px solid #ddd;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: #555;
            font-size: 15px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-btn,
        .btn,
        select {
            height: 40px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
        }

        .icon-btn {
            width: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn img {
            width: 18px;
        }

        select {
            padding: 0 15px;
            color: #444;
        }

        .btn {
            padding: 0 18px;
            font-weight: 600;
        }

        .dark-btn {
            background: #111827;
            color: white;
            border: none;
        }

        .cart-btn {
            position: relative;
        }

        .cart-count {
            position: absolute;
            top: -6px;
            right: -6px;
            background: red;
            color: white;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero {
            width: 100%;
            height: 420px;
            position: relative;
            overflow: hidden;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(45%);
        }

        .hero-content {
            position: absolute;
            top: 50%;
            left: 70px;
            transform: translateY(-50%);
            color: white;
            width: 45%;
        }

        .new-tag {
            color: #9ff4d2;
            font-size: 14px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .hero-content h1 {
            font-size: 58px;
            line-height: 1.1;
            margin: 18px 0;
        }

        .hero-content p {
            font-size: 18px;
            color: #ddd;
            line-height: 1.6;
        }

        .stats {
            position: absolute;
            right: 70px;
            bottom: 60px;
            display: flex;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            overflow: hidden;
            backdrop-filter: blur(12px);
        }

        .stat-box {
            width: 180px;
            padding: 28px;
            color: white;
            border-right: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-box:last-child {
            border-right: none;
        }

        .stat-box h2 {
            font-size: 38px;
            margin-bottom: 10px;
        }

        .stat-box p {
            color: #ddd;
            font-size: 15px;
        }

        @media(max-width: 950px) {

            nav {
                flex-direction: column;
                gap: 20px;
                padding: 20px;
            }

            .hero-content {
                width: 80%;
                left: 30px;
            }

            .hero-content h1 {
                font-size: 40px;
            }

            .stats {
                position: static;
                margin-top: 30px;
                transform: none;
                width: fit-content;
            }

            .hero {
                height: auto;
            }
        }

        @media(max-width: 700px) {

            .nav-right {
                flex-wrap: wrap;
                justify-content: center;
            }

            .stats {
                flex-direction: column;
            }

            .stat-box {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            }

            .stat-box:last-child {
                border-bottom: none;
            }

            .hero-content h1 {
                font-size: 32px;
            }
        }
    </style>
</head>

<body>

    <nav>

        <div class="nav-left">
            <div class="logo">NovaCart</div>

            <div class="nav-links">
                <a href="#">Shop</a>
                <a href="#">About</a>
            </div>
        </div>

        <div class="nav-right">

            <button class="icon-btn">
                <img src="./search-icon.png">
            </button>

            <select>
                <option>All categories</option>
                <option>Beauty</option>
                <option>Electronics</option>
                <option>Fashion</option>
                <option>Home</option>
                <option>Sports</option>
            </select>

            <button class="btn">Login</button>

            <button class="btn dark-btn">Register</button>

            <button class="icon-btn cart-btn">
                <img src="./shopping-bag.png">
                <span class="cart-count">0</span>
            </button>

        </div>

    </nav>

    <section class="hero">

        <img src="https://images.unsplash.com/photo-1555529669-e69e7aa0ba9a?auto=format&fit=crop&w=1800&q=80"
            alt="Hero Image">

        <div class="hero-content">

            <span class="new-tag">NEW COLLECTION</span>

            <h1>
                Shop reliable products for everyday work and life.
            </h1>

            <p>
                Curated electronics, fashion, home goods, and accessories with a fast local cart
                experience.
            </p>

        </div>

        <div class="stats">

            <div class="stat-box">
                <h2>50</h2>
                <p>Products</p>
            </div>

            <div class="stat-box">
                <h2>5</h2>
                <p>Pages</p>
            </div>

            <div class="stat-box">
                <h2>24h</h2>
                <p>Dispatch</p>
            </div>

        </div>

    </section>

</body>

</html>
