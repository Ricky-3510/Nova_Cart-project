<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f5f5f5;
            color: #111;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 70px;
            background: white;
            border-bottom: 1px solid #ddd;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: #555;
            font-size: 15px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-btn,
        .btn,
        select {
            height: 40px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
        }

        .icon-btn {
            width: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn img {
            width: 18px;
        }

        select {
            padding: 0 15px;
            color: #444;
        }

        .btn {
            padding: 0 18px;
            font-weight: 600;
        }

        .dark-btn {
            background: #111827;
            color: white;
            border: none;
        }

        .cart-btn {
            position: relative;
        }

        .cart-count {
            position: absolute;
            top: -6px;
            right: -6px;
            background: red;
            color: white;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero {
            width: 100%;
            height: 420px;
            position: relative;
            overflow: hidden;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(45%);
        }

        .hero-content {
            position: absolute;
            top: 60%;
            left: 70px;
            transform: translateY(-50%);
            color: white;
            width: 45%;
        }

        .new-tag {
            color: #9ff4d2;
            font-size: 14px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .hero-content h1 {
            font-size: 50px;
            line-height: 1.1;
            margin: 18px 0;
        }

        .hero-content p {
            font-size: 18px;
            color: #ddd;
            line-height: 1.6;
        }

        .stats {
            position: absolute;
            right: 70px;
            bottom: 40px;
            display: flex;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            overflow: hidden;
            backdrop-filter: blur(12px);
        }

        .stat-box {
            width: 180px;
            padding: 28px;
            color: white;
            border-right: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-box:last-child {
            border-right: none;
        }

        .stat-box h2 {
            font-size: 38px;
            margin-bottom: 10px;
        }

        .stat-box p {
            color: #ddd;
            font-size: 15px;
        }

        .product-grid-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .grid-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin: 20px 0 30px;
        }

        .grid-controls p {
            color: #666;
            font-size: 14px;
        }

        .grid-controls p span {
            font-weight: 600;
            color: #111;
        }

        .sortSelect {
            height: 40px;
            padding: 0 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 20px;
        }

        .product-card {
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
            background: white;
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .image-container {
            height: 220px;
            background: #f4f4f4;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
        }

        .category {
            display: inline-block;
            background: #8effbc;
            color: #007710;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .card-content h3 {
            font-size: 17px;
            margin-bottom: 10px;
        }

        .description {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-size: 18px;
            font-weight: bold;
        }

        .add-btn {
            background: #111;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .pagination button {
            padding: 10px 16px;
            border: none;
            background: white;
            border: 1px solid #ccc;
            cursor: pointer;
            border-radius: 6px;
            font-weight: 600;
        }

        .pagination button.active {
            background: #111;
            color: white;
        }

        .pagination button:hover {
            background: #111;
            color: white;
        }

        @media(max-width:950px) {

            nav {
                flex-direction: column;
                gap: 20px;
                padding: 20px;
            }

            .hero-content {
                width: 80%;
                left: 30px;
            }

            .hero-content h1 {
                font-size: 40px;
            }

            .stats {
                position: static;
                margin-top: 30px;
            }
        }

        @media(max-width:700px) {

            .products-grid {
                grid-template-columns: 1fr;
            }

            .grid-controls {
                flex-direction: column;
                align-items: flex-start;
            }

            .hero-content h1 {
                font-size: 32px;
            }

            .stats {
                flex-direction: column;
            }

            .stat-box {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            }
        }
    </style>
</head>

<body>

    <nav>

        <div class="nav-left">

            <div class="logo">NovaCart</div>

            <div class="nav-links">
                <a href="index.html">Shop</a>
                <a href="about.html">About</a>
            </div>

        </div>

        <div class="nav-right">

            <button class="icon-btn">
                <img src="../NovaCart/search-icon.png" alt="">
            </button>

            <select id="categoryFilter">
                <option value="all">All Categories</option>
            </select>

            <button class="btn">Login</button>

            <button class="btn dark-btn">Register</button>

            <button class="icon-btn cart-btn">
                <img src="../NovaCart/shopping-bag.png" alt="">
                <span class="cart-count">0</span>
            </button>

        </div>

    </nav>

    <section class="hero">

        <img src="https://images.unsplash.com/photo-1555529669-e69e7aa0ba9a?auto=format&fit=crop&w=1800&q=80">

        <div class="hero-content">

            <span class="new-tag">NEW COLLECTION</span>

            <h1>
                Shop reliable products for everyday work and life.
            </h1>

            <p>
                Curated electronics, fashion, home goods, and accessories with a fast local cart
                experience.
            </p>

        </div>

        <div class="stats">

            <div class="stat-box">
                <h2>50</h2>
                <p>Products</p>
            </div>

            <div class="stat-box">
                <h2>5</h2>
                <p>Pages</p>
            </div>

            <div class="stat-box">
                <h2>24h</h2>
                <p>Dispatch</p>
            </div>

        </div>

    </section>

    <section class="product-grid-container">

        <h2>Products</h2>

        <div class="grid-controls">

            <p id="productInfo"></p>

            <select class="sortSelect" id="sortSelect">
                <option value="featured">Featured</option>
                <option value="price-low">Price: Low to High</option>
                <option value="price-high">Price: High to Low</option>
            </select>

        </div>

        <div class="products-grid" id="productsGrid"></div>

        <div class="pagination" id="pagination"></div>

    </section>

    <script>

        let allProducts = [];
        let filteredProducts = [];

        let currentPage = 1;
        const productsPerPage = 10;

        async function loadProducts() {

            try {

                const response = await fetch(
                    'https://cdn.jsdelivr.net/gh/adarshahelvar/NovaCart/products.json'
                );

                allProducts = await response.json();

                filteredProducts = [...allProducts];

                createCategoryOptions();

                displayProducts();

                createPagination();

            } catch (error) {

                console.log(error);

                document.getElementById("productsGrid").innerHTML =
                    "<h2>Failed to load products</h2>";
            }
        }

        function createCategoryOptions() {

            const categoryFilter = document.getElementById("categoryFilter");

            const categories = [
                ...new Set(allProducts.map(product => product.category))
            ];

            categories.forEach(category => {

                categoryFilter.innerHTML += `
                    <option value="${category}">
                        ${category}
                    </option>
                `;
            });
        }

        function displayProducts() {

            const grid = document.getElementById("productsGrid");

            const start = (currentPage - 1) * productsPerPage;

            const end = start + productsPerPage;

            const paginatedProducts = filteredProducts.slice(start, end);

            grid.innerHTML = paginatedProducts.map(product => `

                <article class="product-card">

                    <div class="image-container">
                        <img src="${product.image}" alt="${product.name}">
                    </div>

                    <div class="card-content">

                        <span class="category">
                            ${product.category}
                        </span>

                        <h3>${product.name}</h3>

                        <p class="description">
                            ${product.description}
                        </p>

                        <div class="card-footer">

                            <span class="price">
                                $${product.price}
                            </span>

                            <button class="add-btn">
                                Add
                            </button>

                        </div>

                    </div>

                </article>

            `).join("");

            document.getElementById("productInfo").innerHTML = `
                Showing 
                <span>${start + 1}</span> -
                <span>${Math.min(end, filteredProducts.length)}</span>
                of 
                <span>${filteredProducts.length}</span>
                products
            `;
        }

        function createPagination() {

            const pagination = document.getElementById("pagination");

            const totalPages =
                Math.ceil(filteredProducts.length / productsPerPage);

            pagination.innerHTML = "";

            let prevButton = document.createElement("button");

            prevButton.innerText = "Previous";

            prevButton.disabled = currentPage === 1;

            prevButton.addEventListener("click", () => {

                if (currentPage > 1) {

                    currentPage--;

                    displayProducts();

                    createPagination();
                }
            });

            pagination.appendChild(prevButton);

            for (let i = 1; i <= totalPages; i++) {

                let button = document.createElement("button");

                button.innerText = i;

                if (i === currentPage) {
                    button.classList.add("active");
                }

                button.addEventListener("click", () => {

                    currentPage = i;

                    displayProducts();

                    createPagination();
                });

                pagination.appendChild(button);
            }

            let nextButton = document.createElement("button");

            nextButton.innerText = "Next";

            nextButton.disabled = currentPage === totalPages;

            nextButton.addEventListener("click", () => {

                if (currentPage < totalPages) {

                    currentPage++;

                    displayProducts();

                    createPagination();
                }
            });

            pagination.appendChild(nextButton);
        }

        document.getElementById("categoryFilter")
            .addEventListener("change", function () {

                const selectedCategory = this.value;

                currentPage = 1;

                if (selectedCategory === "all") {

                    filteredProducts = [...allProducts];

                } else {

                    filteredProducts = allProducts.filter(product =>
                        product.category === selectedCategory
                    );
                }

                displayProducts();

                createPagination();
            });

        document.getElementById("sortSelect")
            .addEventListener("change", function () {

                const value = this.value;

                if (value === "price-low") {

                    filteredProducts.sort((a, b) => a.price - b.price);

                } else if (value === "price-high") {

                    filteredProducts.sort((a, b) => b.price - a.price);

                }

                currentPage = 1;

                displayProducts();

                createPagination();
            });

        loadProducts();

    </script>

</body>
