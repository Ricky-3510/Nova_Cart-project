<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>NovaCart Login</title>

      <style>
            * {
                  margin: 0;
                  padding: 0;
                  box-sizing: border-box;
                  font-family: Arial, Helvetica, sans-serif;
            }

            body {
                  box-sizing: border-box;
                  background: #f5f5f5;
                  color: #111;
            }

            /* Navbar */

            nav {
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  padding: 15px 70px;
                  background: white;
                  border-bottom: 1px solid #ddd;
            }

            .nav-left {
                  display: flex;
                  align-items: center;
                  gap: 30px;
            }

            .logo {
                  font-size: 28px;
                  font-weight: bold;
            }

            .nav-links {
                  display: flex;
                  gap: 20px;
            }

            .nav-links a {
                  text-decoration: none;
                  color: #555;
                  font-size: 15px;
            }

            .nav-right {
                  display: flex;
                  align-items: center;
                  gap: 12px;
            }

            .btn {
                  height: 40px;
                  border-radius: 8px;
                  border: 1px solid #ccc;
                  background: white;
                  cursor: pointer;
            }

            .btn {
                  padding: 0 18px;
                  font-weight: 600;
            }

            .dark-btn {
                  background: #111827;
                  color: white;
                  border: none;
            }

            /* Login Container */

            .container {
                  width: 1100px;
                  background: white;
                  margin: 50px auto;
                  border-radius: 10px;
                  overflow: hidden;
                  display: flex;
                  box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }

            .left {
                  width: 48%;
                  position: relative;
            }

           .left img {
                filter: brightness(0.4) contrast(1.1);
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .overlay {
                  position: absolute;
                  bottom: 40px;
                  left: 40px;
                  color: white;
            }

            .overlay h4 {
                  color: #a7f3d0;
                  letter-spacing: 2px;
                  margin-bottom: 15px;
            }

            .overlay h1 {
                  font-size: 36px;
                  line-height: 55px;
                  margin-bottom: 20px;
            }

            .overlay p {
                  width: 85%;
                  font-size: 20px;
                  line-height: 30px;
            }

            .right {
                  width: 52%;
                  padding: 80px 90px;
            }

            .right h1 {
                  font-size: 50px;
                  margin-bottom: 15px;
            }

            .subtitle {
                  color: #666;
                  font-size: 20px;
                  margin-bottom: 40px;
            }

            .form-group {
                  margin-bottom: 30px;
            }

            .form-group label {
                  display: block;
                  margin-bottom: 10px;
                  font-size: 20px;
            }

            .form-group input {
                  width: 100%;
                  padding: 18px;
                  border: 1px solid #ccc;
                  border-radius: 8px;
                  font-size: 17px;
            }

            .form-group input:focus {
                  outline: none;
                  border-color: #111827;
            }

            .error {
                  color: red;
                  font-size: 14px;
                  margin-top: 5px;
            }

            .remember {
                  display: flex;
                  justify-content: space-between;
                  align-items: center;
                  margin-bottom: 30px;
            }

            .remember-left {
                  display: flex;
                  align-items: center;
                  gap: 10px;
            }

            .remember-left input {
                  width: 18px;
                  height: 18px;
            }

            .remember a {
                  color: black;
                  font-size: 18px;
            }

            .submit-btn {
                  width: 100%;
                  padding: 18px;
                  border: none;
                  background: #111827;
                  color: white;
                  border-radius: 8px;
                  font-size: 24px;
                  cursor: pointer;
            }

            .submit-btn:hover {
                  background: black;
            }

            @media(max-width:950px) {

                  nav {
                        flex-direction: column;
                        gap: 20px;
                        padding: 20px;
                  }

                  .container {
                        width: 95%;
                        flex-direction: column;
                  }

                  .left,
                  .right {
                        width: 100%;
                  }

                  .overlay h1 {
                        font-size: 35px;
                        line-height: 45px;
                  }

                  .right {
                        padding: 40px;
                  }
            }

            @media(max-width:700px) {

                  .nav-right {
                        flex-wrap: wrap;
                        justify-content: center;
                  }
            }
      </style>
</head>

<body>

      <!-- Navbar -->

      <nav>

            <div class="nav-left">

                  <div class="logo">NovaCart</div>

                  <div class="nav-links">
                        <a href="index.html">Shop</a>
                        <a href="about.html">About</a>
                  </div>

            </div>

            <div class="nav-right">

                  <button class="btn" onclick="window.location.href='login.html'">Login</button>

                  <button class="btn dark-btn" onclick="window.location.href='Registration.html'">
                        Register
                  </button>

            </div>

      </nav>

      <!-- Login Form -->

      <div class="container">

            <div class="left">

                  <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1100&q=80"
                        alt="Login Image">

                  <div class="overlay">
                        <h4>WELCOME BACK</h4>
                        <h1>Access your cart and continue shopping faster.</h1>
                        <p>Your demo account is stored locally in this browser for portfolio and learning use.</p>

                  </div>

            </div>

            <div class="right">

                  <h1>Login</h1>

                  <p class="subtitle">
                        Enter your registered email and password.
                  </p>

                  <form id="loginForm">

                        <div class="form-group">

                              <label>Email address</label>

                              <input type="email" id="email">

                              <div class="error" id="emailError"></div>

                        </div>

                        <div class="form-group">

                              <label>Password</label>

                              <input type="password" id="password">

                              <div class="error" id="passwordError"></div>

                        </div>

                        <div class="remember">

                              <div class="remember-left">
                                    <input type="checkbox" unchecked>
                                    <label>Remember me</label>
                              </div>

                              <a href="Registration.html">Create account</a>

                        </div>

                        <button type="submit" class="submit-btn">
                              Login
                        </button>

                  </form>

            </div>

      </div>

      <script>

            let form = document.getElementById("loginForm");

            form.addEventListener("submit", function (e) {

                  e.preventDefault();

                  let email = document.getElementById("email").value.trim();

                  let password = document.getElementById("password").value.trim();

                  document.getElementById("emailError").innerHTML = "";
                  document.getElementById("passwordError").innerHTML = "";

                  let valid = true;


                  // Email Validation

                  let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

                  if (email === "") {

                        document.getElementById("emailError").innerHTML =
                              "Email is required";

                        valid = false;
                  }

                  else if (!email.match(emailPattern)) {

                        document.getElementById("emailError").innerHTML =
                              "Enter valid email";

                        valid = false;
                  }


                  // Password Validation

                  if (password === "") {

                        document.getElementById("passwordError").innerHTML =
                              "Password is required";

                        valid = false;
                  }

                  else if (password.length < 8) {

                        document.getElementById("passwordError").innerHTML =
                              "Password must be at least 8 characters";

                        valid = false;
                  }


                  // Login Success

                  if (valid) {

                        alert("Login Successful");

                        form.reset();
                  }

            });

      </script>

</body>

</html>
